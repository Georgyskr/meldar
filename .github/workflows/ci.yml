name: CI

on:
  push:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint + Type + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & format
        run: pnpm biome check .

      - name: Typecheck
        run: pnpm typecheck

      - name: Test @meldar/storage
        run: pnpm --filter @meldar/storage test

      - name: Test @meldar/web (unit only)
        run: pnpm --filter @meldar/web exec vitest run --exclude='src/__tests__/integration/**' --exclude='src/__tests__/smoke/**'

  integration:
    name: Integration Tests (real DB)
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Integration tests (real Neon DB)
        run: pnpm --filter @meldar/web exec vitest run src/__tests__/integration/

  smoke:
    name: Smoke Tests (real APIs)
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 3
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CF_SANDBOX_WORKER_URL: ${{ secrets.CF_SANDBOX_WORKER_URL }}
      CF_SANDBOX_HMAC_SECRET: ${{ secrets.CF_SANDBOX_HMAC_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Smoke tests (real APIs)
        run: pnpm --filter @meldar/web exec vitest run src/__tests__/smoke/ --testTimeout 60000

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [check, integration, smoke]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel@37

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
