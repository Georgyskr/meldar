name: CI

on:
  push:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & format
        run: pnpm biome check .

      - name: Typecheck
        run: pnpm typecheck

      - name: Test @meldar/storage
        run: pnpm --filter @meldar/storage test

      - name: Test @meldar/web
        run: pnpm --filter @meldar/web test
