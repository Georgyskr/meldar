name: CI

on:
  push:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint + Type + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & format
        run: pnpm biome check .

      - name: Typecheck
        run: pnpm typecheck

      - name: Test @meldar/storage
        run: pnpm --filter @meldar/storage test

      - name: Test @meldar/web (unit only)
        run: pnpm --filter @meldar/web exec vitest run --exclude='src/__tests__/integration/**' --exclude='src/__tests__/smoke/**'

  sandbox-worker-image-smoke:
    # P0-4: pin the runtime toolchain the worker depends on. If the base image
    # ever flips to Alpine/BusyBox, bash `/dev/tcp` silently fails and the
    # sandbox never reports ready. This smoke fails the build instead.
    name: Sandbox image smoke (bash / setsid / curl / /dev/tcp)
    runs-on: ubuntu-latest
    timeout-minutes: 7
    defaults:
      run:
        working-directory: apps/sandbox-worker
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: apps/sandbox-worker
          load: true
          tags: meldar-sandbox-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Assert required tools exist in image
        run: |
          docker run --rm --entrypoint bash meldar-sandbox-smoke -lc '
            set -e
            command -v bash
            command -v setsid
            command -v nohup
            command -v curl
            command -v fuser
            command -v pkill
            bash -c "(echo > /dev/tcp/127.0.0.1/1) 2>/dev/null; echo devtcp-supported"
          '

  deploy-worker:
    # P0-5: reproducible worker deploy via CI. Replaces laptop `wrangler deploy`.
    # Requires repo secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID.
    # Runs only on main so PR branches can't ship to prod.
    name: Deploy sandbox-worker to Cloudflare
    runs-on: ubuntu-latest
    needs: [check, sandbox-worker-image-smoke]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    concurrency:
      group: deploy-sandbox-worker
      cancel-in-progress: false
    defaults:
      run:
        working-directory: apps/sandbox-worker
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Deploy via wrangler
        # Note: `packageManager` is deliberately NOT set here —
        # `cloudflare/wrangler-action@v3` only recognises npm/yarn and would
        # run a bogus `pnpm install` inside apps/sandbox-worker (no local
        # lockfile in this monorepo). The root `pnpm install` step above
        # places wrangler where the action expects it.
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/sandbox-worker

  integration:
    name: Integration Tests (real DB)
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Integration tests (real Neon DB)
        # --testTimeout=30000 absorbs Neon serverless cold-start on the first
        # DB roundtrip (`createTestUser` in each suite). The default 5s bites
        # when the DB has been idle for ~5 minutes between CI runs.
        run: pnpm --filter @meldar/web exec vitest run src/__tests__/integration/ --testTimeout=30000

  smoke:
    name: Smoke Tests (real APIs)
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 5
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CF_SANDBOX_WORKER_URL: ${{ secrets.CF_SANDBOX_WORKER_URL }}
      CF_SANDBOX_HMAC_SECRET: ${{ secrets.CF_SANDBOX_HMAC_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Smoke tests (real APIs)
        run: pnpm --filter @meldar/web exec vitest run src/__tests__/smoke/ --testTimeout 60000

  e2e:
    name: Playwright E2E (real app)
    runs-on: ubuntu-latest
    # P0-5: gate e2e on deploy-worker so PR changes that modify both the web
    # client and the worker never test new client against old worker.
    needs: [check, deploy-worker]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CF_SANDBOX_WORKER_URL: ${{ secrets.CF_SANDBOX_WORKER_URL }}
      CF_SANDBOX_HMAC_SECRET: ${{ secrets.CF_SANDBOX_HMAC_SECRET }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      DOTENV_CONFIG_QUIET: "true"
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Playwright E2E (default suite — excludes @nightly)
        run: pnpm --filter @meldar/web run test:e2e

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 30
          if-no-files-found: ignore

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [check, integration, smoke, e2e, deploy-worker]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel@50

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
