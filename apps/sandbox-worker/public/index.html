<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Meldar Sandbox Spike — Host Page</title>
		<style>
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
				background: #1a1218;
				color: #faf9f6;
				min-height: 100vh;
				display: flex;
			}
			.sidebar {
				width: 420px;
				padding: 2rem;
				border-right: 1px solid #3a2a32;
				overflow-y: auto;
			}
			.sidebar h1 {
				margin: 0 0 0.5rem 0;
				font-size: 1.5rem;
				background: linear-gradient(135deg, #623153 0%, #ffb876 100%);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
			}
			.sidebar p {
				color: #9a8a91;
				line-height: 1.5;
				font-size: 0.875rem;
			}
			.preview {
				flex: 1;
				display: flex;
				flex-direction: column;
				background: #0f0a0d;
			}
			.preview-bar {
				padding: 0.75rem 1rem;
				background: #1f1519;
				border-bottom: 1px solid #3a2a32;
				font-family: monospace;
				font-size: 0.75rem;
				color: #9a8a91;
				display: flex;
				gap: 1rem;
				align-items: center;
			}
			.preview-bar code {
				flex: 1;
				color: #faf9f6;
				word-break: break-all;
			}
			iframe {
				flex: 1;
				width: 100%;
				border: 0;
				background: #faf9f6;
			}
			button {
				display: block;
				width: 100%;
				padding: 0.75rem 1rem;
				margin: 0.5rem 0;
				background: linear-gradient(135deg, #623153 0%, #ffb876 100%);
				color: #1a1218;
				border: 0;
				border-radius: 8px;
				font-size: 0.875rem;
				font-weight: 600;
				cursor: pointer;
				transition: transform 0.1s;
			}
			button:hover {
				transform: translateY(-1px);
			}
			button:disabled {
				opacity: 0.4;
				cursor: not-allowed;
				transform: none;
			}
			.log {
				font-family: monospace;
				font-size: 0.75rem;
				padding: 1rem;
				background: #0f0a0d;
				border-radius: 8px;
				margin-top: 1rem;
				max-height: 300px;
				overflow-y: auto;
				white-space: pre-wrap;
				border: 1px solid #3a2a32;
			}
			.log-entry {
				margin: 0.25rem 0;
			}
			.log-entry.ok {
				color: #7fd1a8;
			}
			.log-entry.err {
				color: #ff6b6b;
			}
			.log-entry.info {
				color: #9a8a91;
			}
			.metric {
				display: inline-block;
				padding: 0.125rem 0.5rem;
				background: #3a2a32;
				border-radius: 4px;
				font-family: monospace;
				font-size: 0.75rem;
				margin-left: 0.5rem;
			}
			.status-dot {
				display: inline-block;
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: #3a2a32;
				margin-right: 0.5rem;
			}
			.status-dot.running {
				background: #7fd1a8;
				box-shadow: 0 0 8px #7fd1a8;
			}
			.status-dot.booting {
				background: #ffb876;
				animation: pulse 1s infinite;
			}
			@keyframes pulse {
				0%,
				100% {
					opacity: 1;
				}
				50% {
					opacity: 0.4;
				}
			}
		</style>
	</head>
	<body>
		<aside class="sidebar">
			<h1>Meldar Sandbox Spike</h1>
			<p>
				Proves Cloudflare Sandbox SDK can run Next.js 16 with an iframe-embeddable
				preview URL. Watch the metrics after each action.
			</p>
			<button id="start">Start sandbox + boot Next.js</button>
			<button id="write" disabled>Rewrite page.tsx (tests HMR via writeFile)</button>
			<button id="stop" disabled>Stop process (for cold-start timing)</button>
			<div class="log" id="log">
				<div class="log-entry info">
					Ready. Click "Start sandbox" to begin.
				</div>
			</div>
		</aside>
		<main class="preview">
			<div class="preview-bar">
				<span class="status-dot" id="status"></span>
				<code id="preview-url">No preview URL yet</code>
			</div>
			<iframe id="preview" src="about:blank"></iframe>
		</main>
		<script>
			const logEl = document.getElementById('log')
			const iframe = document.getElementById('preview')
			const urlEl = document.getElementById('preview-url')
			const statusEl = document.getElementById('status')
			const startBtn = document.getElementById('start')
			const writeBtn = document.getElementById('write')
			const stopBtn = document.getElementById('stop')

			function log(msg, level = 'info') {
				const entry = document.createElement('div')
				entry.className = `log-entry ${level}`
				entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`
				logEl.appendChild(entry)
				logEl.scrollTop = logEl.scrollHeight
			}

			startBtn.addEventListener('click', async () => {
				startBtn.disabled = true
				statusEl.className = 'status-dot booting'
				log('Spawning sandbox + starting next dev...')
				const t0 = performance.now()
				try {
					const res = await fetch('/api/sandbox')
					const data = await res.json()
					const total = Math.round(performance.now() - t0)
					if (!res.ok) throw new Error(JSON.stringify(data))
					log(
						`${data.warm ? 'warm reuse' : 'cold start'} — server=${data.elapsedMs}ms  total=${total}ms`,
						'ok',
					)
					log(`preview url: ${data.url}`)
					urlEl.textContent = data.url
					iframe.src = data.url
					statusEl.className = 'status-dot running'
					writeBtn.disabled = false
					stopBtn.disabled = false
					startBtn.disabled = false
				} catch (err) {
					log(`failed: ${err.message}`, 'err')
					statusEl.className = 'status-dot'
					startBtn.disabled = false
				}
			})

			writeBtn.addEventListener('click', async () => {
				writeBtn.disabled = true
				const now = new Date().toISOString()
				const newSource = `export default function HomePage() {
  return (
    <main style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', padding: '2rem', textAlign: 'center' }}>
      <h1 style={{ fontSize: '3rem', fontWeight: 700, background: 'linear-gradient(135deg, #ff6b6b 0%, #ffd86b 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text', marginBottom: '1rem' }}>
        Rewritten by writeFile!
      </h1>
      <p style={{ fontSize: '1.25rem', color: '#4f434a' }}>This file was injected at ${now}</p>
    </main>
  )
}
`
				log('POST /api/write → overwriting src/app/page.tsx')
				const t0 = performance.now()
				try {
					const res = await fetch('/api/write', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({ path: 'src/app/page.tsx', content: newSource }),
					})
					const data = await res.json()
					const total = Math.round(performance.now() - t0)
					log(`writeFile ok — server=${data.elapsedMs}ms  total=${total}ms`, 'ok')
					log('watch the iframe for HMR update...')
					writeBtn.disabled = false
				} catch (err) {
					log(`write failed: ${err.message}`, 'err')
					writeBtn.disabled = false
				}
			})

			stopBtn.addEventListener('click', async () => {
				log('Stopping process...')
				try {
					const res = await fetch('/api/stop')
					const data = await res.json()
					log(`stop: ${JSON.stringify(data)}`, data.ok ? 'ok' : 'err')
				} catch (err) {
					log(`stop failed: ${err.message}`, 'err')
				}
			})
		</script>
	</body>
</html>
